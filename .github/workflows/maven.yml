name: Maven Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      run_parallel:
        description: 'Run tests in parallel?'
        required: true
        type: boolean
        default: false
      test_filter:
        description: 'Run specific tag (e.g., @smoke)'
        required: false
        default: ''
      environment:
        description: 'Browser environment (chrome|edge|firefox)'
        required: false
        default: 'chrome'

jobs:
  automation-suite:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL || '' }}
      HEADLESS: "true"
      ENVIRONMENT: ${{ inputs.environment || 'chrome' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Run Tests
        run: |
          # Build tags argument - use @UISmoke as default if empty
          if [[ -z "${{ inputs.test_filter }}" ]]; then
            TAG_FILTER="@UISmoke"
          else
            TAG_FILTER="${{ inputs.test_filter }}"
          fi
          # Use environment from input or default to chrome
          ENV_BROWSER=${{ inputs.environment }}
          if [[ -z "$ENV_BROWSER" ]]; then
            ENV_BROWSER="chrome"
          fi
          mvn clean verify -Dcucumber.filter.tags="${TAG_FILTER}" -Denvironment="${ENV_BROWSER}"
        env:
          LIST_OF_CREDENTIALS: ${{ secrets.LIST_OF_CREDENTIALS }}

      - name: Upload Serenity Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: |
            target/site/serenity/
            build/test-results/
          retention-days: 7

      - name: Upload Timeline Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timeline-report
          path: |
            build/test-results/timeline/
          retention-days: 7        
