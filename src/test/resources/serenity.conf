serenity {
    project.name = "Dheo Claveria Automation Testing"
    take.screenshots = FOR_FAILURES   # take screenshots on failures only
;     take.screenshots = FOR_EACH_ACTION
    console.colors = true
    logging = VERBOSE
    browser.maximized = true
    report {
    accessibility = true
    }
    requirements {
        types = [theme,capability,feature]
    }
}

drivers {
  # Explicit driver paths removed to allow automatic download and proper platform-specific executables.
  # If you need to pin local drivers, add platform-appropriate binaries (no .exe on Linux/mac) and set the paths here.
}
# headless.mode = true

environments {
  chrome {
    webdriver {
      driver = chrome
      headless.mode = true
      chrome.switches = "--start-maximized, --no-sandbox, --disable-dev-shm-usage, --remote-allow-origins=*, --user-data-dir=target/chrome-profile-${random.int}, --headless=new, --safebrowsing-disable-download-protection, --disable-features=DownloadBubbleV2"
      autodownload = true
      # Use RemoteWebDriver when webdriver.remote.url is set (e.g., in CI/CD pipelines)
      remote.url = ${?webdriver.remote.url}
        timeouts {
        implicit = 10000
        script = 10000
        pageLoad = 10000
        }
        pageLoadStrategy = "normal"
        acceptInsecureCerts = true
        unhandledPromptBehavior = "dismiss"
      capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
"goog:chromeOptions" {
        args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors","start-maximized",
          "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
          "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging",
          "disable-blink-features=AdMetadata", "block-trackers",
          "--disable-extensions-adblock", "--disable-back-forward-cache",
          "--ads-blocker", "--disable-ad-blocking-new-runtime",
          "--disable-ad-sensor", "--no-first-run", "--fast-start", "--disable-features=TranslateUI"],

prefs {
                # Use a safe, cross-platform download directory if needed; leaving default usually works on CI
                download.default_directory = "${user.dir}/target/downloads"
                download.prompt_for_download = false
                download.directory_upgrade = true
                safebrowsing.enabled = false
                # Enable downloads in headless mode
                browser.setDownloadBehavior = "allow"
                browser.setDownloadBehavior = "allowAndActive"
                browser.setDownloadBehavior.default = "allow"
                # Block common ad tracking domains
                profile.default_content_setting_values = {"notifications": 2, "images": 2}
                # Disable auto-playing ads/videos
                profile.media_autoplay_allowed = false
                # Block all third-party cookies (ad trackers)
                profile.cookie_controls_mode = 1
                # Block third-party cookies
                profile.block_third_party_cookies = true
                # Skip sign-in prompts
                "credentials_enable_service": false
                "profile.password_manager_enabled": false
              }
          }
      }
    }
  }
  edge {
    webdriver.driver = edge
       webdriver {
         driver = edge
         headless.mode = false
         autodownload = false
         timeouts {
          implicit = 10000
          script = 10000
          pageLoad = 10000
         }
         capabilities {
           browserName = "MicrosoftEdge"
           "ms:edgeOptions" {
             args = ["test-type", "ignore-certificate-errors", "start-maximized", "inprivate",  "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking"]
           }
         }
       }
  }
firefox {
    webdriver.driver = firefox
    webdriver {
    driver = firefox
    headless.mode = false
    autodownload = true
     timeouts {
       implicit = 10000
       script = 10000
       pageLoad = 10000
      }
      capabilities {
        browserName = "firefox"
        pageLoadStrategy = "normal"
        acceptInsecureCerts = true
        unhandledPromptBehavior = "dismiss"
        strictFileInteractability = true

        "moz:firefoxOptions" {
           args = ["-private", "--start-maximized"]
          prefs {
            "javascript.options.showInConsole": false
          },
          log {"level": "info"},
        }
      }
    }
  }
}

