version: '3.8'

services:
  # Selenium Hub
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub-scaled
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_HEALTHCHECK_INTERVAL=120
      - GRID_MAX_SESSION=20
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    networks:
      - selenium-grid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Chrome Nodes - scale with: docker-compose up --scale chrome-node=3
  chrome-node:
    image: selenium/node-chrome:latest
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    volumes:
      - ./target/downloads:/home/seluser/downloads
    networks:
      - selenium-grid
    deploy:
      replicas: 2  # Start with 2 Chrome nodes

  # Firefox Nodes - scale with: docker-compose up --scale firefox-node=2
  firefox-node:
    image: selenium/node-firefox:latest
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    volumes:
      - ./target/downloads:/home/seluser/downloads
    networks:
      - selenium-grid
    deploy:
      replicas: 1  # Start with 1 Firefox node

networks:
  selenium-grid:
    driver: bridge
