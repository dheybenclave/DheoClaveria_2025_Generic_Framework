# Maven pipeline for DheoClaveria Generic Framework
# Builds and runs tests with JDK 21 and publishes Serenity reports

parameters:
  - name: result
    type: string
    default: '**/target/site/serenity/'
  - name: tag
    displayName: Tag
    type: string
    default: '@CRUD'
  - name: browser
    displayName: Browser
    values:
      - chrome
      - edge
    default: chrome
  - name: headless
    displayName: Headless
    values:
      - 'true'
      - 'false'
    default: 'false'
  - name: publishToStorage
    displayName: Publish Serenity report to Azure Blob
    type: boolean
    default: false
  - name: azureServiceConnection
    displayName: Azure service connection (for blob upload)
    type: string
    default: ''
  - name: storageAccount
    displayName: Storage account name
    type: string
    default: ''
  - name: storageContainer
    displayName: Storage container name
    type: string
    default: ''
  - name: storagePath
    displayName: Path/prefix inside container
    type: string
    default: ''

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - name: tag
    value: ${{ parameters.tag }}
  - name: browser
    value: ${{ parameters.browser }}
  - name: headless
    value: ${{ parameters.headless }}

steps:

  # Cache Maven repository between runs
  - task: Cache@2
    inputs:
      key: "maven | $(Agent.OS) | **/pom.xml"
      path: ~/.m2/repository
      restoreKeys: |
        maven | $(Agent.OS)

  # Explicitly install Temurin (Adoptium) JDK 21 on the hosted Linux agent so we guarantee Java 21
  - bash: |
      set -euo pipefail
      echo "Installing Temurin JDK 21..."
      JDK_DIR="$AGENT_TEMPDIRECTORY/jdk-21"
      mkdir -p "$JDK_DIR"
      echo "Downloading JDK 21 binary from Adoptium API (this will follow redirects)..."
      curl -L -o /tmp/jdk21.tar.gz "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/adoptium"
      tar -xzf /tmp/jdk21.tar.gz -C "$JDK_DIR" --strip-components=1
      echo "JDK extracted to $JDK_DIR"
      echo "##vso[task.setvariable variable=JAVA_HOME]$JDK_DIR"
      echo "##vso[task.prependpath]$JDK_DIR/bin"
    displayName: 'Install Temurin JDK 21 (Adoptium)'
    condition: eq( variables['Agent.OS'], 'Linux' )

  # Build and run tests using Maven and JDK 21
  - task: Maven@3
    inputs:
      mavenPomFile: 'pom.xml'
      mavenOptions: '-Xmx3072m'
      # Use the JDK we just installed above; use Path so we can point to the JAVA_HOME variable
      javaHomeOption: 'Path'
      jdkDirectory: '$(JAVA_HOME)'
      goals: 'clean verify'
      options: >-
        -D"cucumber.filter.tags"="$(tag)"
        -Denvironment="$(browser)"
        -Dheadless.mode="$(headless)"
        -Daccess=$(DOOR_ACCESS)
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # Publish failsafe/final test results (Serenity/Failsafe)
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/target/failsafe-reports/*.xml'
      failTaskOnFailedTests: true

  # Publish Serenity HTML report as a pipeline artifact
  - task: PublishPipelineArtifact@1
    condition: succeededOrFailed()
    inputs:
      targetPath: 'target/site/serenity'
      artifact: 'serenity-report'

  # Attach Serenity index.html to the pipeline summary so it's visible inline in the run summary
  - bash: |
      REPORT="$(System.DefaultWorkingDirectory)/target/site/serenity/index.html"
      if [ -f "$REPORT" ]; then
        echo "Attaching Serenity report to pipeline summary: $REPORT"
        echo "##vso[task.addattachment type=Distributedtask.Core.Summary;name=Serenity Report]$REPORT"
      else
        echo "Serenity report not found at $REPORT"
      fi
    displayName: 'Attach Serenity report to pipeline summary (Linux)'
    condition: and(succeededOrFailed(), eq( variables['Agent.OS'], 'Linux' ))

  - powershell: |
      $report = "$(System.DefaultWorkingDirectory)\target\site\serenity\index.html"
      if (Test-Path $report) {
        Write-Host "Attaching Serenity report to pipeline summary: $report"
        Write-Host "##vso[task.addattachment type=Distributedtask.Core.Summary;name=Serenity Report]$report"
      } else {
        Write-Host "Serenity report not found at $report"
      }
    displayName: 'Attach Serenity report to pipeline summary (Windows)'
    condition: and(succeededOrFailed(), eq( variables['Agent.OS'], 'Windows_NT' ))

  # Optionally upload the Serenity site to Azure Blob Storage (requires service connection and storage details)
  - task: AzureCLI@2
    displayName: 'Upload Serenity report to Azure Blob (optional)'
    condition: and(succeeded(), eq('${{ parameters.publishToStorage }}', 'true'))
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        echo "Uploading Serenity report to storage account '${{ parameters.storageAccount }}' container '${{ parameters.storageContainer }}'..."
        # Use Azure AD auth (service connection) to upload
        az storage blob upload-batch --account-name "${{ parameters.storageAccount }}" \
          -s target/site/serenity -d "${{ parameters.storageContainer }}" --destination-path "${{ parameters.storagePath }}" --auth-mode login --no-progress
        echo "Upload complete"
    env:
      AZURE_CORE_OUTPUT: json

