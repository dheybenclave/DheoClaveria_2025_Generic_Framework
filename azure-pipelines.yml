# Maven pipeline for DheoClaveria Generic Framework
# Builds and runs tests with JDK 21 and publishes Serenity reports

parameters:
  - name: result
    type: string
    default: '**/target/site/serenity/'
  - name: tag
    displayName: Tag
    type: string
    default: '@UISmoke'
  - name: browser
    displayName: Browser
    values:
      - chrome
      - edge
      - firefox
    default: chrome
  - name: headless
    displayName: Headless
    values:
      - 'true'
      - 'false'
    default: 'false'
  - name: useRemoteDriver
    displayName: Use Remote WebDriver
    values:
      - 'true'
      - 'false'
    default: 'false'
  - name: remoteDriverUrl
    displayName: Remote WebDriver URL
    type: string
    default: 'http://localhost:4444/wd/hub'

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - name: tag
    value: ${{ parameters.tag }}
  - name: browser
    value: ${{ parameters.browser }}
  - name: headless
    value: ${{ parameters.headless }}
  - name: useRemoteDriver
    value: ${{ parameters.useRemoteDriver }}
  - name: remoteDriverUrl
    value: ${{ parameters.remoteDriverUrl }}

steps:

  # Cache Maven repository between runs
  - task: Cache@2
    inputs:
      key: "maven | $(Agent.OS) | **/pom.xml"
      path: ~/.m2/repository
      restoreKeys: |
        maven | $(Agent.OS)

  # Explicitly install Temurin (Adoptium) JDK 21 on the hosted Linux agent so we guarantee Java 21
  - bash: |
      set -euo pipefail
      echo "Installing Temurin JDK 21..."
      JDK_DIR="$AGENT_TEMPDIRECTORY/jdk-21"
      mkdir -p "$JDK_DIR"
      echo "Downloading JDK 21 binary from Adoptium API (this will follow redirects)..."
      curl -L -o /tmp/jdk21.tar.gz "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/adoptium"
      tar -xzf /tmp/jdk21.tar.gz -C "$JDK_DIR" --strip-components=1
      echo "JDK extracted to $JDK_DIR"
      echo "##vso[task.setvariable variable=JAVA_HOME]$JDK_DIR"
      echo "##vso[task.prependpath]$JDK_DIR/bin"
    displayName: 'Install Temurin JDK 21 (Adoptium)'
    condition: eq( variables['Agent.OS'], 'Linux' )

  # Prepare webdriver binaries: remove accidental .exe files and ensure drivers are executable on Linux
  - bash: |
      set -euo pipefail
      echo "Preparing webdriver binaries: cleaning Windows executables and setting +x on drivers"
      WEBROOT="$(System.DefaultWorkingDirectory)/src/test/resources/webdriver"
      if [ -d "$WEBROOT" ]; then
        echo "Removing Windows .exe files under $WEBROOT"
        find "$WEBROOT" -type f -name '*.exe' -print -delete || true
        echo "Making chromedriver and msedgedriver executable if present"
        find "$WEBROOT" -type f -iname 'chromedriver*' -exec chmod +x {} \; || true
        find "$WEBROOT" -type f -iname 'msedgedriver*' -exec chmod +x {} \; || true
      else
        echo "$WEBROOT not found, skipping webdriver prep"
      fi
    displayName: 'Prepare webdriver binaries (cleanup + chmod)'
    condition: eq( variables['Agent.OS'], 'Linux' )

  # Pre-clean: kill any leftover Chrome processes before running tests
  - bash: |
      set -euo pipefail
      echo "Killing leftover Chrome/Chromedriver processes (Linux)..."
      pkill -f chrome || true
      pkill -f chromedriver || true
      pkill -f chromium || true
      pkill -f google-chrome || true
    displayName: 'Pre-clean: Kill Chrome processes (Linux)'
    condition: eq( variables['Agent.OS'], 'Linux' )

  - powershell: |
      Write-Host "Killing leftover Chrome/Chromedriver processes (Windows)..."
      $names = @('chrome','chromedriver')
      foreach ($n in $names) {
        Get-Process -Name $n -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      }
    displayName: 'Pre-clean: Kill Chrome processes (Windows)'
    condition: eq( variables['Agent.OS'], 'Windows_NT' )

  # Build and run tests using Maven and JDK 21 (Local WebDriver mode)
  - task: Maven@3
    condition: eq(variables['useRemoteDriver'], 'false')
    inputs:
      mavenPomFile: 'pom.xml'
      mavenOptions: '-Xmx3072m'
      javaHomeOption: 'Path'
      jdkDirectory: '$(JAVA_HOME)'
      goals: 'clean verify'
      options: >-
        -D"cucumber.filter.tags"="$(tag)"
        -Denvironment="$(browser)"
        -Dheadless.mode="$(headless)"
        -Daccess=$(DOOR_ACCESS)
        -Dchrome.userDataDir="$(Agent.TempDirectory)/chrome-profile-$(Agent.Id)-$(Build.BuildId)"
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # Build and run tests using Maven and JDK 21 (RemoteWebDriver mode)
  - task: Maven@3
    condition: eq(variables['useRemoteDriver'], 'true')
    inputs:
      mavenPomFile: 'pom.xml'
      mavenOptions: '-Xmx3072m'
      javaHomeOption: 'Path'
      jdkDirectory: '$(JAVA_HOME)'
      goals: 'clean verify'
      options: >-
        -D"cucumber.filter.tags"="$(tag)"
        -Denvironment="$(browser)"
        -Dheadless.mode="$(headless)"
        -Daccess=$(DOOR_ACCESS)
        -Dchrome.userDataDir="$(Agent.TempDirectory)/chrome-profile-$(Agent.Id)-$(Build.BuildId)"
        -Dwebdriver.driver=remote
        -Dwebdriver.remote.driver=$(browser)
        -Dwebdriver.remote.url=$(remoteDriverUrl)
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # Publish failsafe/final test results (Serenity/Failsafe)
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/target/failsafe-reports/*.xml'
      failTaskOnFailedTests: true

  # Publish Serenity HTML report as a pipeline artifact
  - task: PublishPipelineArtifact@1
    condition: succeededOrFailed()
    inputs:
      targetPath: 'target/site/serenity'
      artifact: 'serenity-report'

  # Attach Serenity index.html to the pipeline summary so it's visible inline in the run summary
  - bash: |
      REPORT="$(System.DefaultWorkingDirectory)/target/site/serenity/index.html"
      if [ -f "$REPORT" ]; then
        echo "Attaching Serenity report to pipeline summary: $REPORT"
        echo "##vso[task.addattachment type=Distributedtask.Core.Summary;name=Serenity Report]$REPORT"
      else
        echo "Serenity report not found at $REPORT"
      fi
    displayName: 'Attach Serenity report to pipeline summary (Linux)'
    condition: and(succeededOrFailed(), eq( variables['Agent.OS'], 'Linux' ))

  - powershell: |
      $report = "$(System.DefaultWorkingDirectory)\target\site\serenity\index.html"
      if (Test-Path $report) {
        Write-Host "Attaching Serenity report to pipeline summary: $report"
        Write-Host "##vso[task.addattachment type=Distributedtask.Core.Summary;name=Serenity Report]$report"
      } else {
        Write-Host "Serenity report not found at $report"
      }
    displayName: 'Attach Serenity report to pipeline summary (Windows)'
    condition: and(succeededOrFailed(), eq( variables['Agent.OS'], 'Windows_NT' ))

  # (Azure Blob upload step removed)
  - task: QodanaScan@2025
    inputs:
      args: -l,jetbrains/qodana-jvm-community:2025.2
      # When prMode is set to true, Qodana analyzes only the files that have been changed
      prMode: false,
      postPrComment: true
      # Upload Qodana results (SARIF, other artifacts, logs) as an artifact to the job
      uploadResult: false
      # quick-fixes available in Ultimate and Ultimate Plus plans
      pushFixes: 'none'
    env:
      QODANA_TOKEN: $(QODANA_TOKEN)
