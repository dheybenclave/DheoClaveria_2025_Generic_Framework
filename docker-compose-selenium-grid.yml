version: '3.8'

services:
  # Selenium Hub - central point for routing test requests
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"  # Event bus publish
      - "4443:4443"  # Event bus subscribe
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_HEALTHCHECK_INTERVAL=120
    networks:
      - selenium-grid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Chrome Node - can run multiple Chrome sessions
  chrome-node:
    image: selenium/node-chrome:latest
    container_name: selenium-chrome-node
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7900:7900"  # noVNC for viewing Chrome sessions
    volumes:
      - ./target/downloads:/home/seluser/downloads
    networks:
      - selenium-grid

  # Firefox Node - can run multiple Firefox sessions
  firefox-node:
    image: selenium/node-firefox:latest
    container_name: selenium-firefox-node
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7901:7900"  # noVNC for viewing Firefox sessions
    volumes:
      - ./target/downloads:/home/seluser/downloads
    networks:
      - selenium-grid

  # Edge Node - can run multiple Edge sessions
  edge-node:
    image: selenium/node-edge:latest
    container_name: selenium-edge-node
    depends_on:
      - selenium-hub
    shm_size: 2gb
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7902:7900"  # noVNC for viewing Edge sessions
    volumes:
      - ./target/downloads:/home/seluser/downloads
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
